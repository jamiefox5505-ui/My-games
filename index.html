<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <button onclick="showTab('home')" class="nav-btn">Home</button>
        <button onclick="showTab('games')" class="nav-btn">Games</button>
    </nav>

    <div id="home" class="tab-content active">
        <div class="browser-container">
            <div class="browser-bar">
                <input type="text" id="userQuery" placeholder="Search anything here...">
                <button onclick="runSearch()">Go</button>
            </div>
            <div id="view-box">
                <p style="padding-top: 100px; color: #555;">Search stays in this window!</p>
            </div>
        </div>
    </div>

    <div id="games" class="tab-content">
        <h1>My Games</h1>
        <div id="game-grid" class="container">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
<button onclick="runSearch()">Go</button>
